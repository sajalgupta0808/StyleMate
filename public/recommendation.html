<!DOCTYPE html>
<html>
<head>
  <title>StyleMate</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body>

<div class="container mt-5">

  <h1>
    Outfit Recommendation
  </h1>

  <select
    id="occasion"
    class="form-select">

    <option value="casual">
      Casual
    </option>

    <option value="date">
      Date Night
    </option>

    <option value="office">
      Office
    </option>

  </select>

  <button
    class="btn btn-primary mt-3"
    onclick="generateOutfit()">

    Generate Outfit

  </button>

  <div
    id="result"
    class="mt-4">
  </div>

</div>

<script src="js/recommendation.js"></script>

</body>
</html>
